<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <span class="logo-symbol">∇</span>
      <span class="logo-text">{{ site.title }}</span>
    </a>

    <nav class="site-nav" id="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">
        Início
      </a>
      <a href="{{ '/blog/' | relative_url }}" class="nav-link {% if page.url contains '/blog/' %}active{% endif %}">
        Blog
      </a>
      <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url contains '/about/' %}active{% endif %}">
        Sobre
      </a>
    </nav>

    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
